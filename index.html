<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>007 Production — ระบบสั่งผลิต</title>
<style>
:root{--bg:#f1f3f6;--panel:#fff;--ink:#1a2233;--muted:#6b7688;--line:#e2e6ec;
--accent:#1f5eff;--red:#d92d20;--amber:#b54708;--green:#067647;--purple:#7c6bd6;--teal:#0aa5a0;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:'Segoe UI',system-ui,'Leelawadee UI','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:9px 14px 0;flex:0 0 auto}
.h1r{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
h1{font-size:16px;margin:0;font-weight:800}
.conn{font-size:10.5px;border-radius:99px;padding:2px 9px;font-weight:700}
.conn.live{background:#e6f4ea;color:var(--green)}
.conn.off{background:#fee4e2;color:var(--red)}
body.busy button{pointer-events:none;opacity:.55}
.tline{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.7}
.tline b{color:#3c4657;font-weight:700}
.tline .dur{background:#e6f7f6;color:#0a8a85;border-radius:99px;padding:1px 7px;font-weight:700;white-space:nowrap}
.syncs{display:flex;gap:7px;font-size:10.5px;color:var(--muted);flex-wrap:wrap}
.syncs .bad{color:var(--red);font-weight:700}
.userchip{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:#e8f0ff;color:var(--accent);border-radius:99px;padding:4px 11px}
.userchip button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0}
.h2r{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap;padding-bottom:9px}
.tabs,.vtabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--panel);border-radius:99px;padding:6px 13px;font-size:13.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.vtab{border:none;background:#eef1f5;border-radius:99px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap}
.vtab.on{background:var(--accent);color:#fff}
.vtab .b{background:var(--red);color:#fff;font-size:10px;border-radius:99px;padding:0 5px;margin-left:3px}
main{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px}
main.boardmode{overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;scroll-snap-type:x proximity}
.page{max-width:840px;margin:0 auto}
.hint{font-size:12px;color:var(--muted);background:#eef3ff;border:1px solid #d5e2ff;border-radius:10px;padding:8px 12px;line-height:1.5;margin-bottom:11px}
.socard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:10px}
.socard.dim{opacity:.6}
.so-h{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.so-h .so{font-weight:800;font-size:14px}
.so-h .cu{font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:110px}
.bdg{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;white-space:nowrap}
.bdg.late{background:#fee4e2;color:var(--red)}
.bdg.today{background:#fff4e5;color:var(--amber)}
.bdg.due{background:#eef1f5;color:var(--muted)}
.bdg.paid{background:#e6f4ea;color:var(--green)}
.bdg.inter{background:#efe9ff;color:var(--purple)}
.bdg.urgent{background:#fff4e5;color:var(--amber)}
.oi{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.oi input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);flex:0 0 auto}
.oi .d{flex:1;line-height:1.35;min-width:0}
.oi .q{white-space:nowrap;font-weight:700;font-size:12px}
.oi.stock{color:var(--muted)}
.oi.noprod{background:#fff5f4;border-radius:8px;padding:6px 8px}
.mchip{font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;background:#e8f0ff;color:var(--accent);white-space:nowrap;flex:0 0 auto}
.mchip.bad{background:#fee4e2;color:var(--red)}
.stag{font-size:10px;background:#eef1f5;border-radius:5px;padding:1px 6px;flex:0 0 auto;color:var(--muted)}
.dtag{font-size:10px;background:#e6f4ea;color:var(--green);border-radius:5px;padding:1px 6px;font-weight:700;flex:0 0 auto}
.warn{font-size:11px;color:var(--red);font-weight:700;margin-top:2px}
.so-foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 15px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.btn.blue{background:var(--accent);color:#fff}.btn.dark{background:var(--ink);color:#fff}
.btn.green{background:var(--green);color:#fff}.btn.grey{background:#eef1f5;color:var(--ink)}
.btn.amber{background:#fff4e5;color:var(--amber);border:1px solid #f5d9b0}
.btn.red{background:#fee4e2;color:var(--red)}
.btn:disabled{opacity:.35;cursor:default}
.okpill{margin-left:auto;font-size:12px;font-weight:800;color:var(--green)}
.tkt{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:9px}
.tk-h{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tk-h .so{font-weight:800;font-size:13px}
.cchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#f4f6f9;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:700;max-width:100%}
.cchip i{width:10px;height:10px;border-radius:3px;border:1px solid rgba(0,0,0,.12);flex:0 0 auto}
.met{display:flex;gap:10px;font-size:11px;color:var(--muted);margin-top:5px;flex-wrap:wrap}
.met b{color:var(--ink)}
.who{font-size:10.5px;color:var(--muted);margin-top:4px}
.who b{color:var(--accent)}
.planrow{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.planx{margin-top:8px;background:#f7f9fc;border:1px dashed var(--line);border-radius:10px;padding:9px 11px;display:none}
.planx.show{display:block}
.planx select{border:1px solid var(--line);border-radius:8px;padding:8px;font-size:13px;font-family:inherit;margin-right:6px;background:#fff}
.coil{font-size:11px;margin-top:4px;font-weight:700}
.coil.ok{color:var(--green)}.coil.low{color:var(--red)}.coil.na{color:var(--muted);font-weight:400}
.col{flex:0 0 280px;max-width:87vw;display:flex;flex-direction:column;background:#e9edf2;border-radius:13px;scroll-snap-align:start;min-height:0}
.col.down{background:#fbeceb}
.col-h{padding:9px 12px;display:flex;align-items:center;gap:7px;border-top:4px solid var(--cc,#8a94a6);border-radius:13px 13px 0 0}
.col-h .t{font-size:13px;font-weight:800}
.col-h .cnt{margin-left:auto;font-size:11.5px;font-weight:700;background:var(--panel);border-radius:99px;padding:2px 8px;color:var(--muted)}
.col-h .dn{font-size:10px;color:var(--red);font-weight:800}
.col-h .mfix{border:none;background:none;cursor:pointer;font-size:13px;padding:0 2px}
.cards{flex:1;overflow-y:auto;padding:0 8px 10px;display:flex;flex-direction:column;gap:8px}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer}
.strip{height:4px;border-radius:99px;margin:-2px 0 7px;background:#e2e6ec;overflow:hidden}
.strip i{display:block;height:100%;border-radius:99px}
.bc-foot{display:flex;gap:6px;margin-top:7px;align-items:center}
.bc-foot .btn{padding:8px 12px;font-size:12px;margin-left:auto}
.empty{font-size:11.5px;color:var(--muted);text-align:center;padding:16px 0}
.ovbg{position:fixed;inset:0;background:rgba(15,22,36,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
.ovbg.show{display:flex}
.sheet{background:var(--panel);width:min(540px,100%);max-height:86vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column}
@media(min-width:700px){.ovbg{align-items:center}.sheet{border-radius:16px}}
.s-h{padding:13px 16px 9px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.s-x{margin-left:auto;border:none;background:#eef1f5;border-radius:99px;width:32px;height:32px;font-size:15px;cursor:pointer}
.s-b{overflow-y:auto;padding:12px 16px 16px;font-size:13px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
.fields label{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:3px}
.fields input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:13px;font-family:inherit;outline:none}
.hist{font-size:11.5px;color:var(--muted);line-height:1.75;margin-top:10px}
.sec{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 5px}
table.items{width:100%;border-collapse:collapse;font-size:12px}
table.items td{padding:4px 3px;border-bottom:1px solid var(--line)}
table.items td.q{text-align:right;white-space:nowrap;font-weight:700}
.pk-row{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--line)}
.pk-row .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pk-st{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;white-space:nowrap}
.truck{background:#f2faf4;border:1.5px dashed #9ad2ae;border-radius:10px;padding:9px 12px;margin-top:9px;font-size:12.5px;display:flex;gap:14px;flex-wrap:wrap}
.truck b{font-size:15px}
.urgbox{display:flex;gap:6px;margin-bottom:11px}
.urgbox input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;font-family:inherit;outline:none}
/* login */
.login-bg{position:fixed;inset:0;background:linear-gradient(160deg,#141b2b,#1f2b45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.login{background:var(--panel);border-radius:20px;padding:22px 22px 26px;width:min(420px,100%)}
.login h2{margin:0 0 2px;font-size:18px}
.login .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.lg-branches{display:flex;gap:6px;margin-bottom:12px}
.lg-branches button{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);font-family:inherit}
.lg-branches button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.lg-staff{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:200px;overflow-y:auto;margin-bottom:12px}
.lg-staff button{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:12px 8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.lg-staff button.on{border-color:var(--accent);background:#e8f0ff;color:var(--accent);font-weight:800}
.pinrow{display:flex;justify-content:center;gap:10px;margin:6px 0 12px}
.pindot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
.pindot.f{background:var(--accent);border-color:var(--accent)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pinpad button{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:15px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit}
.pinpad button:active{background:#e8f0ff}
.lg-err{color:var(--red);font-size:12.5px;font-weight:700;text-align:center;min-height:17px;margin-top:8px}
.lg-wait{font-size:12.5px;color:var(--green);font-weight:700;text-align:center;margin-top:8px;display:none}
</style>
</head>
<body>
<header>
  <div class="h1r">
    <h1>🏭 007 Production</h1>
    <span class="conn off" id="conn">…</span>
    <div class="syncs" id="syncs"></div>
    <span class="userchip" id="userchip" style="display:none"></span>

  <div class="h2r">

<main id="main"></main>

</div></div>

      <div class="lg-wait" id="lg-wait">📬 ส่งแล้ว — เปิดอีเมลแล้ว<b>กดลิงก์ Sign in</b> ได้เลย (หน้านี้จะเข้าระบบให้เอง)</div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  url: "https://dbbhgacstsddonprgiuo.supabase.co",
  key: "sb_publishable_qeQZH08Oan3cMxmhCNGnVQ_XmOfx4s6"
};

/* ================= DAL (Data Access Layer) =================
   ทุกการคุยกับ Supabase ผ่าน DB เท่านั้น — ทดสอบแทนที่ด้วย window.__MOCK_DB__ ได้ */
let sb = null;
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
const STAFF_COLS = "id,branch,name,role,can_approve,active,email";
let DB = {
  async init(){
    await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js");
    sb = window.supabase.createClient(CONFIG.url, CONFIG.key);
  },
  async getStaff(){ const {data,error} = await sb.from("staff").select(STAFF_COLS).eq("active",true).order("id"); if(error) throw error; return data; },
  async verifyPin(id,pin){ const {data,error} = await sb.rpc("verify_pin",{p_staff:id,p_pin:pin}); return !error && data===true; },
  async sendOtp(email){ const {error} = await sb.auth.signInWithOtp({email, options:{emailRedirectTo: location.origin+location.pathname}}); if(error) throw error; },
  async getSessionEmail(){ const {data:{session}} = await sb.auth.getSession(); return session && session.user && session.user.email ? session.user.email.toLowerCase() : null; },
  async signOut(){ try{ await sb.auth.signOut(); }catch(e){} },
  async fetchAll(table, buildQ){
    const out=[];
    for(let i=0;;i+=1000){
      let q = sb.from(table).select("*"); if(buildQ) q = buildQ(q);
      const {data,error} = await q.range(i,i+999);
      if(error){ console.error(table,error); break; }
      out.push(...data); if(data.length<1000) break;
    }
    return out;
  },
  async loadAll(){
    const cutD = new Date(Date.now()-30*864e5).toISOString().slice(0,10);
    const cutT = new Date(Date.now()-60*864e5).toISOString();
    const [sos, its, tks, machines, coils, jobs, shapes] = await Promise.all([
      this.fetchAll("so_live", q=>q.gte("sodat",cutD)),
      this.fetchAll("so_item_live", q=>q.gte("synced_at",cutT)),
      this.fetchAll("production_ticket", q=>q.gte("created_at",cutT)),
      this.fetchAll("machine"),
      this.fetchAll("coil_stock"),
      this.fetchAll("online_job", q=>q.gte("created_at",cutT)),
      this.fetchAll("shape_drawing", q=>q.gte("updated_at",cutT)),
    ]);
    return {sos, its, tks, machines, coils, jobs, shapes};
  },
  async upsertShape(row){ const {error} = await sb.from("shape_drawing").upsert(row,{onConflict:"branch,sonum,seq"}); if(error) throw error; },
  async fetchSO(branch, sonum){
    const {data:so} = await sb.from("so_live").select("*").eq("branch",branch).eq("sonum",sonum).maybeSingle();
    if(!so) return null;
    const {data:its} = await sb.from("so_item_live").select("*").eq("branch",branch).eq("sonum",sonum).order("seq");
    return {so, its: its||[]};
  },
  async insertTicket(row){ const {data,error} = await sb.from("production_ticket").insert(row).select("id").single(); if(error) throw error; return data.id; },
  async updateTicket(id,patch){ const {error} = await sb.from("production_ticket").update(patch).eq("id",id); if(error) throw error; },
  async insertEvent(ev){ const {error} = await sb.from("ticket_event").insert(ev); if(error) console.error(error); },
  async getEvents(tid){ const {data} = await sb.from("ticket_event").select("*").eq("ticket_id",tid).order("at",{ascending:false}).limit(60); return data||[]; },
  async insertJob(row){ const {error} = await sb.from("online_job").insert(row); if(error) throw error; },
  async updateJob(id,patch){ const {error} = await sb.from("online_job").update(patch).eq("id",id); if(error) throw error; },
  async setMachine(id,patch){ const {error} = await sb.from("machine").update(patch).eq("id",id); if(error) throw error; },
  onChange(cb){
    sb.channel("rt")
      .on("postgres_changes",{event:"*",schema:"public",table:"production_ticket"},cb)
      .on("postgres_changes",{event:"*",schema:"public",table:"so_live"},cb)
      .on("postgres_changes",{event:"*",schema:"public",table:"machine"},cb)
      .on("postgres_changes",{event:"*",schema:"public",table:"online_job"},cb)
      .subscribe();
  },
};
if(window.__MOCK_DB__) DB = window.__MOCK_DB__;

/* ================= master / intelligence ================= */
let MACHINES={SKN:[],BK:[],PPS:[]}, DOWN={}, MACH_NOTE={}, MACH_ID={};
const ONLINE_RE = /shopee|lazada|tiktok|ลาซาด้า|ช้อปปี้|ติ๊กต๊อก/i;
const INTER = {"J042090090":"SKN","J042491555":"BK","J042471222":"PPS","C042491555":"BK"};
const STG = ["รออนุมัติ","รอวางแผน","คิวเครื่อง","กำลังผลิต","ผลิตเสร็จ","แพ็คแล้ว","กำลังส่ง","ส่งสำเร็จ"];
const STGC = ["#d97706","#7c6bd6","#8a94a6","#1f5eff","#0aa5a0","#a1721f","#d97706","#16a34a"];
const WIDTH_M = 0.914, DENS = 7.85;
const todayISO = new Date().toISOString().slice(0,10);
const yesterISO = (()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();

function machineType(stk, des){
  if(stk.startsWith("03VP-PE")) return "PE 5 มม.";
  if(stk.startsWith("03VP-PU")) return /snap|สแน็ป/i.test(des) ? "PU สแน็ปล็อค" : "PU ตรง";
  if(stk.startsWith("03VP")) return null;
  if(stk.startsWith("03S")) return "สเปน";
  if(stk.startsWith("03V")) return "เวนิส";
  if(stk.startsWith("01P3")) return "พาแนล 3 สัน";
  if(stk.startsWith("01P5")) return "พาแนล 5 สัน";
  if(stk.startsWith("01SL")) return "สแน็ปล็อค";
  if(stk.startsWith("01WP")) return "ลอนรั้ว 182";
  if(stk.startsWith("01WR")) return "ลอนฝ้า";
  if(stk.startsWith("01WC")) return "ผนัง 007";
  if(stk.startsWith("01CU")) return "ตรง";
  if(stk.startsWith("01A")) return "ตรง";
  if(/บานเกล็ด/.test(des)) return "บานเกล็ด";
  if(stk.startsWith("02")){
    if(/ตามแบบ/.test(des)) return "พับครอบ";
    if(/จั่ว/.test(des)) return "ครอบจั่ว";
    return "ครอบข้าง";
  }
  return null;
}
function foldCapNeeded(des, mw){
  // ครอบที่ไม่ตรงหน้ารีดมาตรฐานของเครื่องรีด → ต้องไปเครื่องพับครอบ
  const d = des||"";
  if(new RegExp(mw+"\\s*-\\s*\\d").test(d)) return true;   // มี suffix เช่น 457-10 / 457-15 / 304-12 = ครอบพับ
  const other = mw==="457" ? "304" : "457";
  if(d.includes(other)) return true;                        // หน้ากว้างคนละแบบกับเครื่องรีดของสาขา
  return false;
}
const isOnlineSO = so => /^O/.test(so||"") && !/^SO/.test(so||"");   // เผื่อเลข SO ขึ้นต้น O (ชุดพิเศษ)
const isOnlineCus = cc => /^O/.test(cc||"");                          // งานออนไลน์จริง = รหัสลูกค้าขึ้นต้น O (O610310888=Shopee, O610310777=TikTok, ...)
const cardOnline = c => isOnlineCus(c && c.cusCode) || isOnlineSO(c && c.so);
function resolveMachine(br, type, customer, des, isOnline){
  const list = MACHINES[br]||[];
  if(type==="ตรง"){
    if(list.includes("ตรง")) return "ตรง";
    const L = list.find(m=>m.startsWith("ตรง-L")), R = list.find(m=>m.startsWith("ตรง-R"));
    if(L && R) return R;   // Gem เคาะ 20 ก.ค.: ไม่เลือก = ตรง-R ปีกขวาเสมอ — ทีมผลิตเลือก/ย้ายไป L ได้ตอนวางแผนหรือปุ่ม ⇄ บนบอร์ด
    return L||R||type;
  }
  if(type==="ครอบจั่ว"||type==="ครอบข้าง"){
    const m = list.find(x=>x.startsWith(type));
    const fold = list.includes("พับครอบ") ? "พับครอบ" : null;
    if(!m) return fold||type;
    const mw = (m.match(/(\d{3})/)||[])[1];                 // หน้ารีดของเครื่องสาขานี้: 457 หรือ 304
    if(mw && fold && foldCapNeeded(des, mw)) return fold;
    return m;
  }
  return type;
}
function machineOf(stk, des, br, customer, isOnline){
  const t = machineType(stk, des);
  return t ? resolveMachine(br||branch, t, customer, des, isOnline) : null;
}
function coilKeyOf(stk){
  if(stk.startsWith("03VP-PU")) return "PU:"+stk.slice(5);
  if(stk.startsWith("03VP")) return null;
  const m = stk.match(/^0[123][A-Z0-9]*-([A-Z0-9]+)-(\d{3})-?([A-Z0-9]*)/);
  return m ? m[1]+"-"+m[2]+(m[3]?"-"+m[3]:"") : null;
}
function thickOf(key){ const m=(key||"").match(/-(\d{3})(-|$)/); return m? +m[1]/100 : 0.35; }
function labelOf(des, key){
  if((key||"").startsWith("PU:")) return des;
  let s = des.replace(/^[\d.]+\s*-\s*[\d.]+\s*/,"").trim();
  const t = s.split(/\s+/);
  if(t.length>1 && !/0\.\d{2}/.test(t[0])) t.shift();
  return t.join(" ") || des.slice(0,40);
}
const SW=[["ดำ","#23272e"],["เทาเข้ม","#4a5568"],["เทา","#9aa5b1"],["ซิงค์","#c3cad2"],["ขาว","#f2f2ef"],["ครีม","#e9ddc0"],["แดง","#c0392b"],["ส้ม","#e67e22"],["เหลือง","#f1c40f"],["เขียว","#1e8e3e"],["ฟ้า","#3498db"],["น้ำเงิน","#1f4e9e"],["น้ำตาล","#7a4a21"],["ไม้","#8b5e34"],["อิฐ","#a4453a"],["ม่วง","#7d3c98"]];
function swc(l){ for(const [k,v] of SW) if((l||"").includes(k)) return v; return "#b8c0cc"; }
function lenCnt(des, qty){
  const m = des.match(/^([\d.]+)\s*-\s*([\d.]+)/);
  if(m){ const L=+m[1], n=+m[2];
    if(L>0 && Math.abs(L*n-qty)/Math.max(qty,1) < .05) return [L, Math.round(n)];
    if(L>0) return [L, Math.round(qty/L)];
  }
  return [null, null];
}
function coilStock(br, key){
  if(!key || key.startsWith("PU:")) return null;
  const c = COILS[br]||{};
  if(("ZZC-"+key) in c) return c["ZZC-"+key];
  const nk = key.replace(/-[A-Z0-9]+$/,"");
  if(("ZZC-"+nk) in c) return c["ZZC-"+nk];
  return null;
}
function canProduce(br, mach){ return (MACHINES[br]||[]).includes(mach) && !((DOWN[br]||[]).includes(mach)); }
function whoCan(type, customer){
  return Object.keys(MACHINES).filter(b=>{
    const m = resolveMachine(b, type, customer);
    return canProduce(b, m);
  });
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function esq(s){ return (s||"").replace(/'/g,"\\'"); }
function fmt(n,d=1){ return (+n).toLocaleString("th-TH",{maximumFractionDigits:d}); }
function fmtD(iso){ if(!iso) return "—"; const [y,m,d]=iso.split("-"); return d+"/"+m+"/"+(+y+543-2500); }
function nowT(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtT(iso){ if(!iso) return "—"; const d=new Date(iso);
  const dd=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
  const hh=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  return (iso.slice(0,10)===todayISO? "" : dd+" ")+hh;   // วันนี้โชว์แค่เวลา วันอื่นมี วัน/เดือน นำหน้า
}
function durTxt(a,b){
  if(!a||!b) return null;
  const m=Math.round((new Date(b)-new Date(a))/60000);
  if(m<0) return null;
  if(m<60) return m+" นาที";
  const h=Math.floor(m/60);
  if(h<24) return h+" ชม. "+(m%60)+" น.";
  return Math.floor(h/24)+" วัน "+(h%24)+" ชม.";
}

/* ================= state ================= */
let USER=null, STAFF=[], TK=[], JOBS=[], COILS={}, CARDS={SKN:[],BK:[],PPS:[]}, SYNCMAX={}, CUSOF={}, SHAPES={};
let branch="SKN", view="order", openId=null, loaded=false;
let q="", FETCHED={SKN:{},BK:{},PPS:{}}, REOK={}, RSHOW={};  // ค้นหา/ใบเก่าที่ดึงมา/อนุมัติซ้ำแล้ว/ฟอร์มขออนุมัติ
function tks(){ return TK.filter(t=>t.branch===branch && !t.by.rejected); }
function tksOf(br){ return TK.filter(t=>t.branch===br && !t.by.rejected); }
function findSO(so, br){
  // เลข SO ซ้ำข้ามสาขาได้ (Express รันแยกสาขา) — หาในสาขาที่ระบุ/สาขาปัจจุบันก่อนเสมอ
  return CARDS[br||branch].find(c=>c.so===so) || CARDS.SKN.concat(CARDS.BK,CARDS.PPS).find(c=>c.so===so) || jobMeta(so);
}
function jobMeta(so){
  const j = JOBS.find(j=>j.order_no===so);
  return j ? {so:j.order_no, customer:"🛍 "+j.platform+" · "+j.receiver, due:todayISO, cusCode:"", docstat:"N", items:[]} : null;
}
function orderedIdx(so){
  const s=new Set();
  TK.filter(t=>t.so===so && !t.by.rejected).forEach(t=>t.idxs.forEach(x=>s.add(x)));
  return s;
}
function sentTo(so, seq){
  const t = TK.find(t=>t.xborder && t.so===so && t.fromBranch===branch && t.idxs.includes(seq) && !t.by.rejected);
  return t ? t.branch : null;
}
function tItems(t){
  if(t.oitems && t.oitems.length) return t.oitems;
  const c = findSO(t.so, t.branch);
  if(!c) return [];
  if(t.urgent && !t.idxs.length) return c.items;   // ใบด่วนที่สร้างก่อน SO sync = คลุมทั้งใบ → พอ SO มาแล้วดึงรายการ/ความยาวให้อัตโนมัติ
  return c.items.filter(i=>t.idxs.includes(i.seq));
}
function tMetrics(t){
  const its = tItems(t);
  if(!its.length && t.met) return t.met;   // ใช้ค่าที่บันทึกไว้ตอนสร้าง (SO เก่าหลุดหน้าต่างโหลด)
  let m=0, sh=0, mx=0;
  its.forEach(i=>{ if(i.unit==="มร"){ m+=i.qty; const [L,n]=lenCnt(i.des,i.qty); if(n){sh+=n; mx=Math.max(mx,L);} } });
  const kg = m*WIDTH_M*thickOf(t.key)*DENS;
  return {m, sh, mx, kg};
}

/* ================= data mapping ================= */
function applyData(d){
  // machines
  MACHINES={SKN:[],BK:[],PPS:[]}; DOWN={}; MACH_NOTE={}; MACH_ID={};
  d.machines.sort((a,b)=>a.sort-b.sort).forEach(m=>{
    (MACHINES[m.branch]=MACHINES[m.branch]||[]).push(m.name);
    if(m.status==="down") (DOWN[m.branch]=DOWN[m.branch]||[]).push(m.name);
    if(m.note) MACH_NOTE[m.branch+"|"+m.name]=m.note;
    MACH_ID[m.branch+"|"+m.name]=m.id;
  });
  // coils
  COILS={SKN:{},BK:{},PPS:{}};
  d.coils.forEach(c=>{ (COILS[c.branch]=COILS[c.branch]||{})[c.coil_sku]=+c.totbal; });
  // SO cards
  const itBySo={};
  d.its.sort((a,b)=>a.seq-b.seq).forEach(r=>{
    (itBySo[r.branch+"|"+r.sonum]=itBySo[r.branch+"|"+r.sonum]||[]).push(
      {seq:r.seq, stk:r.stkcod||"", des:r.stkdes||"", qty:+r.ordqty||0, rem:+r.remqty||0, unit:r.unit||""});
  });
  CARDS={SKN:[],BK:[],PPS:[]}; SYNCMAX={}; CUSOF={};
  const cutM = new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  d.sos.forEach(r=>{
    if(!CARDS[r.branch]) return;
    CUSOF[r.branch+"|"+r.sonum]=r.cuscod||"";
    if(!SYNCMAX[r.branch] || r.synced_at>SYNCMAX[r.branch]) SYNCMAX[r.branch]=r.synced_at;
    if(r.docstat==="C") return;
    if(r.docstat==="M" && (r.sodat||"") < cutM) return;  // ขายสดตัดบิลแล้ว โชว์ 7 วัน
    CARDS[r.branch].push({so:r.sonum, date:r.sodat, due:r.dlvdat, cusCode:r.cuscod||"",
      customer:r.cusnam||r.cuscod||"", docstat:r.docstat, items:itBySo[r.branch+"|"+r.sonum]||[]});
  });
  // ใบเก่าที่เคยดึงมาด้วยมือ — คงไว้หลัง reload
  ["SKN","BK","PPS"].forEach(b=>Object.values(FETCHED[b]).forEach(c=>{
    if(!CARDS[b].find(x=>x.so===c.so)) CARDS[b].push(c);
  }));
  Object.values(CARDS).forEach(v=>v.sort((a,b)=>(a.due||"9999")<(b.due||"9999")?-1:1));
  // 📐 แบบครอบตามแบบ (วาดจากระยะจริง)
  SHAPES={};
  (d.shapes||[]).forEach(s=>{ SHAPES[s.branch+"|"+s.sonum+"|"+s.seq]=s; });
  // jobs
  JOBS = d.jobs;
  // tickets
  TK = d.tks.map(r=>({
    id:r.id, branch:r.branch, so:r.sonum, mach:r.machine, key:r.material_key||null,
    label:r.label, idxs:r.item_seqs||[], oitems:r.oitems,
    online:r.source==="online" || isOnlineSO(r.sonum) || isOnlineCus(CUSOF[r.branch+"|"+r.sonum]), xborder:r.source==="xborder", urgent:r.source==="urgent",
    fromBranch:r.from_branch, soCover:r.so_cover||"", st:r.stage, route:r.route,
    assignee:r.assignee||"", priority:r.priority||0, coil_lot:r.coil_lot||"", waste:r.waste_note||"",
    by:r.people||{}, met:{m:+r.prod_m||0, sh:+r.sheets||0, mx:+r.max_len||0, kg:+r.weight_kg||0},
    tm:{ordered:r.created_at, ...(r.source!=="xborder"?{approved:r.created_at}:{}), ...(r.times||{})},  // ใบเก่าไม่มี times → ใช้เวลาออกใบแทน
    created:r.created_at
  }));
  loaded=true;
}

function metricsOf(items, key){
  let m=0,sh=0,mx=0;
  items.forEach(i=>{ if(i.unit==="มร"){ m+=i.qty; const [L,n]=lenCnt(i.des,i.qty); if(n){sh+=n; mx=Math.max(mx,L);} } });
  return {mat_m:m, prod_m:m, weight_kg:Math.round(m*WIDTH_M*thickOf(key)*DENS*100)/100, sheets:sh, max_len:mx};
}
const nowISO = () => new Date().toISOString();
async function newTicket(row, action, detail){
  // 🕐 เวลาเป็น key ของ process — ประทับเวลาทุกบทบาทที่ถูกเซ็ตตอนออกใบ (ordered/approved/…)
  if(row.people) row.times = Object.keys(row.people).reduce((o,k)=>(o[k]=nowISO(),o),{});
  const id = await DB.insertTicket(row);
  await DB.insertEvent({ticket_id:id, staff_id:USER.dbid||null, staff_name:USER.name, action, to_stage:row.stage, detail:detail||""});
  return id;
}
async function patchTicket(t, patch, action, detail){
  // 🕐 บทบาทใหม่ที่เพิ่งถูกเซ็ต (planned/started/done/packed/shipped/arrived/accepted/…) → ประทับเวลาอัตโนมัติ
  if(patch.people){
    const nt={...(t.tm||{})};
    Object.keys(patch.people).forEach(k=>{ if(patch.people[k] && !(t.by||{})[k]) nt[k]=nowISO(); });
    patch.times=nt;
  }
  await DB.updateTicket(t.id, patch);
  await DB.insertEvent({ticket_id:t.id, staff_id:USER.dbid||null, staff_name:USER.name, action,
    from_stage:t.st, to_stage:patch.stage!==undefined?patch.stage:t.st, detail:detail||""});
}

function orderProduce(so, isRe){
  const c=findSO(so); if(!c) return;
  const done=orderedIdx(so), byKey={};
  const approver = REOK[so];
  if(isRe && !approver) return;   // สั่งซ้ำต้องผ่านอนุมัติก่อนเท่านั้น
  c.items.forEach(it=>{
    if(done.has(it.seq) && !isRe) return;
    const mach=machineOf(it.stk,it.des,branch,c.customer,cardOnline(c));
    if(!mach || !canProduce(branch,mach)) return;
    const cb=document.getElementById("cb-"+so+"-"+it.seq);
    if(cb && cb.checked){ const k=mach+"|"+(coilKeyOf(it.stk)||"-"); (byKey[k]=byKey[k]||[]).push(it); }
  });
  const ks=Object.keys(byKey); if(!ks.length) return;
  act(async ()=>{
    for(const k of ks){
      const [mach,key]=k.split("|");
      const its=byKey[k], kk=key==="-"?null:key;
      const reDup = isRe && its.some(i=>done.has(i.seq));
      const people = {ordered:USER.name, approved:USER.name};
      if(reDup){ people.reorder_approved = approver.name; people.reorder_reason = approver.reason; }
      await newTicket({branch, source:"so", sonum:so, machine:mach, material_key:kk||"",
        label:labelOf(its[0].des,kk), item_seqs:its.map(i=>i.seq), stage:1,
        people, created_by:USER.dbid||null,
        ...metricsOf(its,kk)},
        "create", reDup
          ? "🔁 สั่งผลิตซ้ำ ("+its.length+" รายการ) — ขอโดย "+USER.name+" · อนุมัติซ้ำโดย "+approver.name+" · สาเหตุ: "+approver.reason
          : "🛒 สั่ง+อนุมัติใบผลิต ("+its.length+" รายการ) → เข้าฝั่งผลิตทันที");
    }
    delete REOK[so];
  });
}

async function urgentGo(){
  if(BUSY) return;
  const inp=document.getElementById("urg-so");

  if(!v) return;
  // 1) มีใบผลิตของ SO นี้ที่สาขานี้แล้ว → ห้ามสร้างซ้ำ (ซ้ำต้องผ่านอนุมัติที่การ์ด SO)
  if(TK.some(t=>t.branch===branch && t.so===v && !t.by.rejected)){
    alertBar("SO "+v+" มีใบผลิตแล้ว — สั่งซ้ำต้องกด 🔁 ที่การ์ด SO (ขออนุมัติ)"); return;
  }
  // 2) ข้อมูล SO sync มาแล้ว → ไม่ต้องใช้ใบด่วนเปล่า ชี้ไปสั่งจากการ์ดจริง (ได้รายการ+ความยาวครบ)
  let c=CARDS[branch].find(x=>x.so===v);   // เลข SO ซ้ำข้ามสาขาได้ — เช็คเฉพาะสาขาตัวเอง
  if(!c){
    BUSY=true; document.body.classList.add("busy");
    try{
      const r=await DB.fetchSO(branch, v);
      if(r){ c={so:r.so.sonum, date:r.so.sodat, due:r.so.dlvdat, cusCode:r.so.cuscod||"",
        customer:r.so.cusnam||r.so.cuscod||"", docstat:r.so.docstat, fetched:true,
        items:(r.its||[]).map(x=>({seq:x.seq, stk:x.stkcod||"", des:x.stkdes||"", qty:+x.ordqty||0, unit:x.unit||""}))};
        FETCHED[branch][c.so]=c;
        if(!CARDS[branch].find(x=>x.so===c.so)) CARDS[branch].push(c);
      }
    }catch(e){ console.error(e); }
    BUSY=false; document.body.classList.remove("busy");
  }
  if(c && c.items && c.items.length){
    q=v; render(); alertBar("ข้อมูล SO "+v+" มีแล้ว — ติ๊กรายการจากการ์ดด้านล่างแล้วกดสั่งได้เลย"); return;
  }
  // 3) ยังไม่มีข้อมูลจริงๆ (เพิ่งคีย์ ยังไม่ครบรอบ sync 2 นาที) → ใบด่วนเปล่า พอ SO มาระบบผูกรายการให้เอง
  act(()=>newTicket({branch, source:"urgent", sonum:v, stage:1, label:"⚡ ด่วน — รอข้อมูล SO sync",
    people:{ordered:USER.name, approved:USER.name}, created_by:USER.dbid||null},
    "create","⚡ สั่งผลิตด่วน "+v+" (ก่อนข้อมูล SO มาถึง)"));
  if(inp) inp.value="";
}

function makeOnlineTickets(jobId){
  const j=JOBS.find(j=>j.id===jobId); if(!j||j.status!=="new") return;
  const byKey={};
  (j.items||[]).forEach(it=>{
    const mach=machineOf(it.stk,it.des,branch,j.platform);
    if(!mach||!canProduce(branch,mach)) return;
    const k=mach+"|"+(coilKeyOf(it.stk)||"-");
    (byKey[k]=byKey[k]||[]).push(it);
  });
  act(async ()=>{
    for(const [k,its] of Object.entries(byKey)){
      const [mach,key]=k.split("|"); const kk=key==="-"?null:key;
      await newTicket({branch, source:"online", sonum:j.order_no, machine:mach, material_key:kk||"",
        label:labelOf(its[0].des,kk), oitems:its, stage:1,
        people:{ordered:USER.name, approved:USER.name}, created_by:USER.dbid||null,
        ...metricsOf(its,kk)},
        "create","🛍 สร้างใบผลิตจาก tag "+j.platform+" "+j.order_no+" → เข้าฝั่งผลิต (ส่งวันนี้)");
    }
    await DB.updateJob(j.id,{status:"ticketed"});
  });
}
function addJobGo(){

  const plat=g("aj-plat"), ord=g("aj-ord").toUpperCase(), recv=g("aj-recv"), lines=g("aj-items");
  if(!ord||!lines) return;
  const items=lines.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{

function metLine(t){

function timeLine(t){
  // 🕐 เวลาเป็น key ของ process: ออกใบ → อนุมัติ → วางแผน → เริ่ม (รอคิวนานเท่าไหร่) → เสร็จ (ผลิตจริงกี่นาที)
  const T=t.tm||{};
  const apr = t.xborder ? T.accepted : (T.approved||T.ordered);
  let s = `🕐 ออกใบ <b>${fmtT(T.ordered)}</b> · อนุมัติ <b>${apr?fmtT(apr):"⏳ รอฝั่งรับ"}</b>`;
  if(T.planned) s += ` · วางแผน <b>${fmtT(T.planned)}</b>`;
  if(T.started){ const w=durTxt(apr||T.ordered, T.started); s += ` · เริ่ม <b>${fmtT(T.started)}</b>${w?` <span class="dur">รอคิว ${w}</span>`:""}`; }
  if(T.done){ const p=durTxt(T.started, T.done); s += ` · เสร็จ <b>${fmtT(T.done)}</b>${p?` <span class="dur">ผลิต ${p}</span>`:""}`; }
  if(T.shipped) s += ` · ส่งออก <b>${fmtT(T.shipped)}</b>`;
  if(T.arrived) s += ` · ถึงลูกค้า <b>${fmtT(T.arrived)}</b>`;
  return `<div class="tline">${s}</div>`;
}

function durMin(a,b){ if(!a||!b) return null; const m=(new Date(b)-new Date(a))/60000; return m>=0? m : null; }
function fmtMin(m){
  if(m===null||isNaN(m)) return "—";
  m=Math.round(m);
  if(m<60) return m+" น.";
  const h=Math.floor(m/60);
  if(h<24) return h+" ชม. "+(m%60)+" น.";
  return Math.floor(h/24)+" วัน "+(h%24)+" ชม.";
}

  const dToday = all.filter(t=>isToday(t.tm&&t.tm.done));

  const mToday = dToday.reduce((s,t)=>s+tMetrics(t).m,0);
  // ---- รายเครื่อง (7 วัน) ----

    const ps = list.map(t=>durMin(t.tm&&t.tm.started, t.tm&&t.tm.done)).filter(x=>x!==null);
    const backlog = all.filter(t=>t.mach===m && t.st>=2 && t.st<=3).length;
    const meters = done.reduce((s,t)=>s+tMetrics(t).m,0);
    return {m, n:list.length, nd:done.length, meters, q:avg(qs), p:avg(ps), backlog, down:(DOWN[branch]||[]).includes(m)};

  el.innerHTML = `<div class="page">

  <div class="socard"><div class="sec" style="margin-top:0">วันนี้ (${fmtD(todayISO)})</div>
    <div class="met" style="flex-wrap:wrap"><span>ออกใบ <b>${oToday.length}</b></span><span>เสร็จ <b>${dToday.length}</b> ใบ (<b>${fmt(mToday)}</b> ม.)</span><span>กำลังผลิต <b>${inProd.length}</b></span><span>รอคิวเครื่อง <b>${inQ.length}</b></span><span>รอวางแผน <b>${inPlan.length}</b></span></div>
    ${bott? `<div class="warn" style="margin-top:8px">🚧 <b>คอขวดตอนนี้: ${esc(bott.m)}</b> — ${bott.q!==null?`คิวเฉลี่ย ${fmtMin(bott.q)}`:""}${bott.backlog?` · ค้าง ${bott.backlog} ใบ`:""}${bott.down?" · ⛔ เครื่องเสียอยู่":""}</div>` : `<div class="who" style="margin-top:8px">✅ ไม่มีคอขวดชัดเจนในรอบ 7 วัน</div>`}
    <div class="who" style="margin-top:6px">⏱ เฉลี่ย 7 วัน: ออกใบ→เสร็จ <b>${leads.length?fmtMin(avg(leads)):"—"}</b> (${leads.length} ใบ)${leadShip.length?` · ออกใบ→ถึงลูกค้า <b>${fmtMin(avg(leadShip))}</b> (${leadShip.length} ใบ)`:""}</div>
  </div>

  ${rows.length? rows.map(r=>`<tr${bott&&r.m===bott.m?' style="background:#fff8ec"':''}><td>${bott&&r.m===bott.m?"🚧 ":""}${r.down?"⛔ ":""}${esc(r.m)}</td><td class="q">${r.n}</td><td class="q">${r.nd}</td><td class="q">${fmt(r.meters)}</td><td class="q">${fmtMin(r.q)}</td><td class="q">${fmtMin(r.p)}</td><td class="q">${r.backlog||""}</td></tr>`).join("") : `<tr><td colspan="7" style="color:var(--muted)">— ยังไม่มีใบผลิตใน 7 วัน —</td></tr>`}

    <div class="met" style="flex-wrap:wrap">${["SKN","BK","PPS"].map(b=>{
      const w=tksOf(b).filter(t=>((t.tm&&t.tm.ordered)||t.created)>=cut7);

/* ================= 📐 ครอบตามแบบ — วาดจากระยะจริง ================= */
const isCustomShape = des => /ตามแบบ/.test(des||"");
function shapeKey(br,so,seq){ return br+"|"+so+"|"+seq; }
function shapeCodeOf(des){ return (String(des||"").match(/ตามแบบ\s*(\d{2,4})/)||[])[1]||null; }
function shapeSVG(segs, small){
  // segs: [{L ซม., a องศาพับ (มุมที่เหล็กทำกัน เช่น 90=มุมฉาก), d 1=พับลง / -1=พับขึ้น}] — วาดจากตัวเลข = scale ตรงเสมอ
  const pts=[[0,0]]; let hx=1, hy=0, x=0, y=0;
  const lbl=[], angL=[];
  segs.forEach((s,i)=>{
    const L=+s.L||0, nx=x+hx*L, ny=y+hy*L;
    lbl.push({x:(x+nx)/2, y:(y+ny)/2, t:fmt(L,1), px:-hy, py:hx});
    x=nx; y=ny; pts.push([x,y]);
    if(i<segs.length-1){
      const a=+s.a||90, d=(+s.d===-1)?-1:1;
      angL.push({x, y, t:a+"°"});
      const th=(180-a)*d*Math.PI/180;
      const nhx=hx*Math.cos(th)-hy*Math.sin(th), nhy=hx*Math.sin(th)+hy*Math.cos(th);
      hx=nhx; hy=nhy;
    }
  });
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const mnx=Math.min(...xs), mxx=Math.max(...xs), mny=Math.min(...ys), mxy=Math.max(...ys);
  const pad=6, w=(mxx-mnx)+pad*2, h=(mxy-mny)+pad*2;
  let grid="";
  if(!small){
    for(let gx=Math.ceil((mnx-pad)/5)*5; gx<=mxx+pad; gx+=5) grid+=`<line x1="${gx}" y1="${(mny-pad).toFixed(1)}" x2="${gx}" y2="${(mxy+pad).toFixed(1)}" stroke="#e9edf3" stroke-width="0.25"/>`;
    for(let gy=Math.ceil((mny-pad)/5)*5; gy<=mxy+pad; gy+=5) grid+=`<line x1="${(mnx-pad).toFixed(1)}" y1="${gy}" x2="${(mxx+pad).toFixed(1)}" y2="${gy}" stroke="#e9edf3" stroke-width="0.25"/>`;
  }
  const path=pts.map((p,i)=>(i?"L ":"M ")+p[0].toFixed(2)+" "+p[1].toFixed(2)).join(" ");
  return `<svg viewBox="${(mnx-pad).toFixed(1)} ${(mny-pad).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}" style="width:100%;max-height:${small?64:300}px;background:#fff;${small?"":"border:1px solid var(--line);border-radius:10px"}">
    ${grid}
    <path d="${path}" fill="none" stroke="#1f2933" stroke-width="${small?1.4:0.8}" stroke-linejoin="miter" stroke-linecap="square"/>
    ${small?"":lbl.map(l=>`<text x="${(l.x+l.px*3.4).toFixed(1)}" y="${(l.y+l.py*3.4).toFixed(1)}" font-size="3.4" text-anchor="middle" fill="#1f5eff" font-weight="700">${l.t}</text>`).join("")}
    ${small?"":angL.map(l=>`<text x="${(l.x).toFixed(1)}" y="${(l.y-1.8).toFixed(1)}" font-size="2.7" text-anchor="middle" fill="#b54708">${l.t}</text>`).join("")}
  </svg>`;
}
let SHED=null;
function openShape(so, seq, des){
  const ex=SHAPES[shapeKey(branch,so,seq)];
  SHED={so, seq:+seq, des,
    segs: ex? JSON.parse(JSON.stringify(ex.segs||[])) : [{L:10,a:90,d:1},{L:10,a:90,d:-1},{L:4}]};
  if(!SHED.segs.length) SHED.segs=[{L:10,a:90,d:1},{L:10}];
  renderShape();
  document.getElementById("shbg").classList.add("show");
}
function closeShape(){ document.getElementById("shbg").classList.remove("show"); }
document.getElementById("shbg").addEventListener("click",e=>{ if(e.target.id==="shbg") closeShape(); });
function shSeg(i,k,v){ SHED.segs[i][k] = (k==="d")? +v : (parseFloat(v)||0); renderShape(); }
function shAdd(){ const last=SHED.segs[SHED.segs.length-1]; if(last&&last.a===undefined){last.a=90;last.d=1;} SHED.segs.push({L:5}); renderShape(); }
function shDel(i){ if(SHED.segs.length>2) SHED.segs.splice(i,1); renderShape(); }
function shGirth(){ return SHED.segs.reduce((s,x)=>s+(+x.L||0),0); }
function renderShape(){
  const g=shGirth(), code=shapeCodeOf(SHED.des);
  const okc = code? Math.abs(g*10-+code)<0.5 : null;
  document.getElementById("sh-t").innerHTML = `📐 ${esc(SHED.so)} · รายการที่ ${SHED.seq}`;
  document.getElementById("sh-b").innerHTML = `
    <div class="who" style="margin-bottom:6px">${esc(SHED.des)}</div>
    ${shapeSVG(SHED.segs)}
    <div class="who" style="margin:7px 0">หน้ากว้างรวม <b>${fmt(g,1)} ซม. = ${fmt(g*10,0)} มม.</b>
      ${code? (okc? `<span class="okpill">✓ ตรงรหัสแบบ ${code}</span>` : `<span class="bdg late">⚠ รหัสสินค้าระบุแบบ ${code} — ผลรวมด้านยังไม่ตรง</span>`) : ""}
      · ตารางพื้นหลัง = 5 ซม.</div>
    <table class="items">${SHED.segs.map((s,i)=>`<tr>
      <td style="white-space:nowrap">ด้านที่ ${i+1}</td>
      <td><input type="number" step="0.5" min="0" value="${s.L}" style="width:74px;border:1px solid var(--line);border-radius:8px;padding:7px;font-size:14px" onchange="shSeg(${i},'L',this.value)"> ซม.</td>
      <td style="white-space:nowrap">${i<SHED.segs.length-1? `พับ
        <select style="border:1px solid var(--line);border-radius:8px;padding:7px" onchange="shSeg(${i},'d',this.value)"><option value="1" ${+s.d!==-1?"selected":""}>↓ ลง</option><option value="-1" ${+s.d===-1?"selected":""}>↑ ขึ้น</option></select>
        <input type="number" step="5" min="10" max="175" value="${s.a||90}" style="width:60px;border:1px solid var(--line);border-radius:8px;padding:7px" onchange="shSeg(${i},'a',this.value)">°` : `<span class="who">ปลายเหล็ก</span>`}</td>
      <td><button class="btn grey" style="padding:5px 9px" onclick="shDel(${i})">✕</button></td>
    </tr>`).join("")}</table>
    <div style="margin-top:9px;display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn grey" onclick="shAdd()">➕ เพิ่มด้าน</button>
      <button class="btn blue" onclick="shSave()">💾 บันทึกแบบ (ช่างเครื่องพับเห็นทันที)</button>
    </div>
    <div class="who" style="margin-top:7px">กรอกระยะเป็น ซม. ตามที่เขียนหน้าบิล · องศา 90 = มุมฉาก (มากกว่า 90 = พับป้าน/ลาดเอียง) · ↓↑ = พับลงหรือขึ้นเทียบด้านก่อนหน้า · รูปวาดจากตัวเลขล้วน — scale ตรงเสมอ ไม่เพี้ยนตามภาพถ่าย</div>`;
}
async function shSave(){
  if(BUSY||!SHED) return;
  BUSY=true; document.body.classList.add("busy");
  try{
    const row={branch, sonum:SHED.so, seq:SHED.seq, des:SHED.des, segs:SHED.segs,
      girth_mm:Math.round(shGirth()*10), updated_by:USER.name, updated_at:new Date().toISOString()};
    await DB.upsertShape(row);
    SHAPES[shapeKey(branch,SHED.so,SHED.seq)]=row;
    closeShape(); render();
  }catch(e){ console.error(e); alertBar("บันทึกแบบไม่สำเร็จ — เช็คเน็ต"); }
  BUSY=false; document.body.classList.remove("busy");
}

let lgBranch="SKN", lgStaff=null, lgPin="";
function renderLogin(){
  document.getElementById("lg-branches").innerHTML = ["SKN","BK","PPS"].map(b=>
    `<button class="${b===lgBranch?'on':''}" onclick="lgSetBranch('${b}')">${b}</button>`).join("");
  const list=STAFF.filter(s=>s.branch===lgBranch||s.branch==="ALL");
  document.getElementById("lg-staff").innerHTML = list.length? list.map(s=>
    `<button class="${lgStaff===s.id?'on':''}" onclick="lgSetStaff(${s.id})">${esc(s.name)}<br><span style="font-size:10px;color:var(--muted)">${({sales:"ทีมขาย",planner:"หัวหน้าผลิต",operator:"ช่างผลิต",packer:"แพ็ค/ส่ง",admin:"แอดมิน"})[s.role]||s.role}</span></button>`).join("")
    : '<div style="grid-column:1/-1;color:var(--muted);font-size:12px">ไม่มีรายชื่อ — เพิ่มในตาราง staff</div>';
  document.getElementById("pinrow").innerHTML = [0,1,2,3].map(i=>`<span class="pindot ${i<lgPin.length?'f':''}"></span>`).join("");
  document.getElementById("pinpad").innerHTML = ["1","2","3","4","5","6","7","8","9","⌫","0","✓"].map(k=>
    `<button onclick="lgKey('${k}')">${k}</button>`).join("");
}
function lgMode(m){
  document.getElementById("lg-email-pane").style.display = m==="email"?"":"none";
  document.getElementById("lg-pin-pane").style.display = m==="pin"?"":"none";
  document.getElementById("lg-err").textContent="";
  if(m==="pin") renderLogin();
}
let otpPoll=null;
async function sendOtp(){
  const err=document.getElementById("lg-err");
  const em=(document.getElementById("lg-email").value||"").trim().toLowerCase();
  if(!em||!em.includes("@")){ err.textContent="กรอกอีเมลก่อนครับ"; return; }
  const s=STAFF.find(s=>s.email&&s.email.toLowerCase()===em);
  if(!s){ err.textContent="อีเมลนี้ยังไม่ได้รับสิทธิ์ — แจ้งแอดมินเพิ่มในระบบก่อน"; return; }
  const btn=document.getElementById("lg-send");
  btn.disabled=true; btn.textContent="กำลังส่ง…";
  try{ await DB.sendOtp(em); }
  catch(e){ btn.disabled=false; btn.textContent="ส่งลิงก์อีกครั้ง"; err.textContent="ส่งไม่สำเร็จ: "+(e.message||e); return; }
  btn.disabled=false; btn.textContent="ส่งลิงก์อีกครั้ง";
  err.textContent=""; document.getElementById("lg-wait").style.display="block";
  clearInterval(otpPoll);
  otpPoll=setInterval(async ()=>{
    const se=await DB.getSessionEmail();
    if(se){ clearInterval(otpPoll); enterByEmail(se); }
  }, 2500);
}
function enterByEmail(em){
  const s=STAFF.find(s=>s.email&&s.email.toLowerCase()===em);
  if(!s){ document.getElementById("lg-err").textContent="อีเมลนี้ยังไม่ได้รับสิทธิ์"; DB.signOut(); return; }
  enterAsStaff(s, "email");
}
function enterAsStaff(s, mode){
  USER={dbid:s.id, name:s.name, role:s.role, branch:s.branch, mode,
    canFix: s.role==="planner"||s.role==="admin"};
  document.getElementById("loginbg").style.display="none";
  const uc=document.getElementById("userchip");
  uc.style.display=""; uc.innerHTML=`👤 ${esc(USER.name)} <button onclick="logout()" title="ออกจากระบบ">✕</button>`;
  if(USER.branch!=="ALL") branch=USER.branch;
  view = ({sales:"order", planner:"plan", operator:"board", packer:"pack"})[USER.role]||"order";
  try{ localStorage.setItem("prod007_pin_user", mode==="pin"? JSON.stringify({id:s.id}) : ""); }catch(e){}
  render();
}
function lgSetBranch(b){ lgBranch=b; lgStaff=null; lgPin=""; renderLogin(); }
function lgSetStaff(id){ lgStaff=id; lgPin=""; document.getElementById("lg-err").textContent=""; renderLogin(); }
async function lgKey(k){
  const err=document.getElementById("lg-err");
  if(k==="⌫"){ lgPin=lgPin.slice(0,-1); renderLogin(); return; }
  if(k==="✓"){ return lgTry(); }
  if(!lgStaff){ err.textContent="เลือกชื่อก่อนครับ"; return; }
  if(lgPin.length>=4) return;
  lgPin+=k; renderLogin();
  if(lgPin.length===4) lgTry();
}
async function lgTry(){
  const err=document.getElementById("lg-err");
  const s=STAFF.find(x=>x.id===lgStaff);
  if(!s||lgPin.length<4) return;
  const ok=await DB.verifyPin(s.id,lgPin);
  if(!ok){ err.textContent="PIN ไม่ถูกต้อง"; lgPin=""; renderLogin(); return; }
  enterAsStaff(s, "pin");
}
async function logout(){
  try{ localStorage.removeItem("prod007_pin_user"); }catch(e){}
  await DB.signOut(); location.reload();
}

/* ================= boot ================= */
let rtTimer=null;
async function boot(){
  const cn=document.getElementById("conn");
  try{
    await DB.init();
    STAFF = await DB.getStaff();
    await reload();
    DB.onChange(()=>{ clearTimeout(rtTimer); rtTimer=setTimeout(()=>reload().then(render),700); });
    setInterval(()=>reload().then(()=>{ render(); }), 90000);
    cn.textContent="LIVE"; cn.className="conn live";
  }catch(e){
    console.error(e);
    cn.textContent="ต่อระบบไม่ได้"; cn.className="conn off";
    document.getElementById("lg-err").textContent="ต่อฐานข้อมูลไม่ได้ — เช็คอินเทอร์เน็ตแล้วรีเฟรช";
    return;
  }
  // คืน session: email (supabase เก็บเอง) หรือ PIN (จอไลน์)
  const se=await DB.getSessionEmail();
  if(se){ enterByEmail(se); return; }
  try{
    const pu=JSON.parse(localStorage.getItem("prod007_pin_user")||"null");
    if(pu&&pu.id){ const s=STAFF.find(x=>x.id===pu.id); if(s){ enterAsStaff(s,"pin"); return; } }
  }catch(e){}
  lgMode("email"); renderLogin();
}
boot();
</script>
